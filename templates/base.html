<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}The Board{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <h1>📌 The Board</h1>
      <p class="tagline">A tiny Flask message board</p>
    </div>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="wrap">Built with Flask &amp; SQLAlchemy</div>
  </footer>
</body>
</html>
